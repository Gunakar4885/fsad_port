server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: connect-campus
  datasource:
    url: jdbc:mysql://localhost:3306/connect_campus?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-should-be-very-long-and-secure}
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days
    issuer: ConnectCampus
  cors:
    allowed-origins: http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  security:
    default-password: ${DEFAULT_PASSWORD:Student@123}
    password-encoder-strength: 10

logging:
  level:
    root: INFO
    org.springframework: INFO
    com.connectcampus: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
